<div class="camera-modal" [class.active]="mostrarCamara">
  <div class="camera-content">
    <h3>Tomar Foto del Conductor</h3>
    
    
    <div class="video-container">
      <video #videoElement class="video-preview" autoplay playsinline></video>
      <canvas #canvasElement width="640" height="480" hidden></canvas>
    </div>

    <div class="camera-actions">
      <button class="btn-cancel" (click)="cancelar()">Cancelar</button>
      <button class="btn-primary" (click)="tomarFoto()">📸 Capturar Foto</button>
    </div>
  </div>
</div>
