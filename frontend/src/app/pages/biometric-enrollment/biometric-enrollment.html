<div class="biometric-container">

  <app-face-capture-card
    [fotoBase64]="fotoBase64"
    (abrirCamara)="abrirCamara()">
  </app-face-capture-card>

  <hr class="separator">

  <app-fingerprint-card
    [huellaTemplate]="huellaTemplate"
    [estaCapturando]="esperohuella"
    (capturar)="capturarHuella()">
  </app-fingerprint-card>

  <div class="footer-action" *ngIf="huellaTemplate">
    <app-button 
      variant="primary" 
      [disabled]="enviando" 
      (clicked)="enviarDatos()">
      {{ enviando ? '⏳ Enviando...' : '🚀 Enviar a Servidor Central' }}
    </app-button>
  </div>

  <app-modal-camara
    [mostrarCamara]="mostrarCamara"
    (cerrarCamara)="cerrarCamara()"
    (capturarFoto)="guardarFotoRecibida($event)">
  </app-modal-camara>

</div>
